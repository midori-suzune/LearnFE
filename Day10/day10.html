<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Document</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
        }
        li{
            list-style: none;
        }
        .list{
            display: flex;
            flex-direction: row;    /* default */
            /* align-items: stretch;    /* default and make the all columns equal height */
            /* align-items: flex-start;    make the columns height depend on the content */ 
            /* align-items: center;    make the columns height depend on the content and center it */
            align-items: flex-end;    /* make the columns height depend on the content and align it to the end of the container */
        }
        .list-iteam{
            padding: 1rem;
            background-color: orange;
            margin: 0 5px;
        }
        .list-iteam:last-child{
            align-self: flex-start;
        }

        li.list-item2{
            align-items: center;
            padding: 1rem;
            background-color: lightblue;
            margin: 0 5px;
            margin: 10px;
            width: 50%;            
        }
        .flex-wrap{
            display: flex;
            justify-content: space-around;;
            flex-wrap: wrap; /* make the items wrap to the next line if they exceed the container width */
        }

        .flex-column{
            height: 100%;
            display: flex;
            flex-direction: column; /* make the items stack vertically */
            align-items: baseline; /* align the items to the baseline of the container */
            justify-content: space-between;
        }
        .item3{
            padding: 1rem;
            background-color: lightgreen;
            margin: 0 5px;
            margin: 10px;
        }

        .ex3{
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: row;
        }
        .ex3 p{
            background-color: lightgray;
            align-self: center;
        }
        .ex3 i{
            height: 20px;
            width: 20px;
            border-radius: 20%;
            padding: 2rem;
            font-size: 2rem;
            background-color: red;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
