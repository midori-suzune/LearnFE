<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    body {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    .icon {
      content: "";
      padding: 10px;
      width: 5rem ;
      height: 5rem;
      top: 50%;
      left: 50%;
      color: red ;
      transform: translate(-50%, -50%);
      position: relative;      
    }
    .icon::after {
      content: "";
      background-color:currentColor;
      opacity: 0.25;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;  
    }
     .icon-user {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      /* color: orange; */
    }
  </style>
</head>

<body>
  <div class="icon">
    <i class="fa-solid fa-user icon-user"></i>
  </div>
</body>

</html>
