<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <main></main> <!-- used for the main content of the page -->
    <header></header> <!-- used for the header of the page -->
    <nav></nav> <!-- used for the navigation of the page -->
    <footer></footer> <!-- used for the footer of the page -->
    <aside></aside> <!-- used for the sidebar of the page -->
    <section></section> <!-- used for a section of the page -->
    <article></article> <!-- used for an article on the page -->
    <iframe src="" frameborder="0"></iframe> <!-- used for embedding another webpage or content -->
    <span></span> <!-- used for inline elements, such as text or images -->
    
    <!--
     - thẻ inline có độ rộng bằng nội dung mà nó chứa 
     - nếu có nhiều thẻ inline nằm với nhau thì nó sẽ nằm trên cùng 1 hàng
     - bị hạn chế về css 
     - không thể chứa các thẻ block khác
     - có thể chứa các thẻ inline khác

    -->

    <!-- 
     - thẻ block có độ rộng bằng 100% của phần tử cha chứa nó
     - mỗi thẻ block sẽ nằm trên một hàng riêng biệt
     - có thể chứa các thẻ inline và block khác
     - có thể áp dụng tất cả các thuộc tính css

     -->
     <div data-href="value"></div> <!-- dùng để lưu trữ dữ liệu tùy chỉnh, có thể truy cập bằng JavaScript -->
     
</body>
</html>
