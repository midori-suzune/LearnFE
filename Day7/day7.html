      .card {
        width: 20rem;
        height: 30rem;
        background-color: bisque;
      }
      .card {
        width: 20rem;
        height: 60rem;
        background-color: black;
        position: relative;
      }
      .sale {
        color: wheat;
        padding: 5px;
        background-color: black;
        border-radius: 2px;
        position: absolute;
        right: 5px;
        top: 10px;
        z-index: 2;
      }
      .title {
        position: relative;
        padding-left: 20px;
      }
      .title::before {
        content: "";
        width: 1rem;
        height: 1rem;
        border-radius: 1rem;
        background-color: red;
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
      }
      .title::after {
        content: " Hoc  ";
      }
      .title3 {
        text-align: center;
        position: relative;
      }
      .title3::before {
        content: "";
        width: 100%;
        height: 2px;
        background-color: tomato;
        position: absolute;
        left: 0;
        top: 50%;
      }
      .title3 span {
        display: inline-block;
        position: relative;
        padding: 10px;
        background-color: rgb(244, 247, 250);
        z-index: 2;
      }
      .icon {
        width: 5rem;
        height: 5rem;
        color: red;
        border-radius: 2px;
      }
      .icon::after {
        content: "";
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background-color: orange;
        position: absolute;
        left: 0;
        top: 0;
      }
      .icon-user {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
